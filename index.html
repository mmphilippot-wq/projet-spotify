<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
    <title>Spoti'stat</title>
  </head>
  <body>
    <div class="container-fluid px-0">
      <div class="row">
        <main class="col-12" x-data="{ musiques: [] }" x-init="chargerMusiques().then(data => musiques = data)">
          <header class="p-4 mb-4 text-white text-center" style="background-color: #2f9eb1;">
            <h1>les musiques de morgane</h1>
            <p>sous titre</p>
          </header>

      <div x-for="morceau in musiques" :key="morceau.id">
      <p x-text="morceau.name"></p>
      </div>
         

        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script/script.js"></script>
  </body>
</html>
