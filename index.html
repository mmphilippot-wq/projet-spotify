<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <title>Spoti'stat</title>
  </head>
  <body>
    <div class="container-fluid px-0">
      <div class="row">
        <main class="col-12"
              x-data="{ musiques: [] }"
              x-init="chargerMusiques().then(data => { musiques = data; creerGraphiqueArtistes(data); creerGraphiqueGenres(data); })">

          <header class="p-4 mb-4 text-white text-center" style="background-color: #2f9eb1;">
            <h1>les musiques de morgane</h1>
            <p>sous titre</p>
          </header>

          <div class="container">

            <section class="mb-5">
              <div class="row g-3">
                <div class="col-md-6">
                  <div class="card shadow-sm h-100">
                    <div class="card-header text-white" style="background:#3b82c4;">
                      Top 10 des artistes
                    </div>
                    <div class="card-body">
                      <canvas id="chartArtistes"></canvas>
                    </div>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="card shadow-sm h-100">
                    <div class="card-header text-white" style="background:#3b82c4;">
                      Distribution des genres musicaux
                    </div>
                    <div class="card-body">
                      <canvas id="chartGenres"></canvas>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <section class="mb-5">
              <div class="card shadow-sm">
                <div class="card-header d-flex flex-wrap align-items-center justify-content-between gap-2 text-white"
                     style="background:#3b82c4;">
                  <span class="fw-semibold fs-5">Liste des Morceaux</span>
                  <div class="input-group input-group-sm" style="max-width:260px;">
                    <span class="input-group-text">🔍</span>
                    <input type="search" class="form-control" placeholder="Rechercher...">
                  </div>
                </div>
                <div class="table-responsive">
                  <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                      <tr>
                        <th scope="col">Titre</th>
                        <th scope="col">Artiste</th>
                        <th scope="col">Album</th>
                        <th scope="col">Action</th>
                      </tr>
                    </thead>
                    <tbody>
                      <template x-for="morceau in musiques" :key="morceau.id">
                        <tr>
                          <td class="fw-medium" x-text="morceau.name"></td>
                          <td class="text-muted" x-text="morceau.artists.map(a => a.name).join(', ')"></td>
                          <td class="text-muted" x-text="morceau.album.name"></td>
                          <td>
                            <button class="btn btn-primary btn-sm" type="button">Détails</button>
                          </td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
              </div>
            </section>

          </div>

        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script/script.js"></script>
  </body>
</html>
